server:
  # v0.5.1 网关默认端口。7991-8090、8146-8245 已被本机环境占用，因此使用 8092。
  # 如需临时覆盖，可启动时传入 --server.port=8250 或设置 GATEWAY_SERVER_PORT。
  port: ${GATEWAY_SERVER_PORT:8092}

spring:
  application:
    # 网关服务名，后续接入 Nacos、SkyWalking、日志采集时会作为服务标识。
    name: java-demo-gateway
  cloud:
    gateway:
      # v0.5.1 暂时使用静态地址转发到三个业务服务。
      # 后续 v0.6 接入 Nacos 后，可将 uri 演进为 lb://java-demo-app、lb://task-service 等服务名。
      routes:
        - id: java-demo-backend-api
          uri: ${JAVA_DEMO_BACKEND_URI:http://localhost:8091}
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/health,/v3/api-docs,/v3/api-docs/**,/swagger-ui.html,/swagger-ui/**
        - id: java-demo-task-api
          uri: ${JAVA_DEMO_TASK_SERVICE_URI:http://localhost:8093}
          predicates:
            - Path=/api/tasks/**
        - id: java-demo-notification-api
          uri: ${JAVA_DEMO_NOTIFICATION_SERVICE_URI:http://localhost:8094}
          predicates:
            - Path=/api/notifications/**
      # 网关统一处理跨域。当前前端主要通过 Vite proxy 访问网关，但保留 CORS 配置便于直接从浏览器调试。
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - Authorization
              - X-Gateway-User-Id
              - X-Gateway-Username
            allow-credentials: true

app:
  jwt:
    # 必须和 backend/app 的 app.jwt.secret 一致，否则后端签发的 token 无法通过网关验签。
    # 本地默认值仅用于学习环境；真实环境必须通过 JAVA_DEMO_JWT_SECRET 覆盖。
    secret: ${JAVA_DEMO_JWT_SECRET:java-demo-v0-1-local-secret-change-me-32chars}
    # 与后端保持同样默认有效期，便于后续统一做 token 刷新或过期提示。
    expiration-seconds: ${JAVA_DEMO_JWT_EXPIRATION_SECONDS:7200}
